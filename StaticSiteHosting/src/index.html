<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <?!= include('style') ?>
</head>

<body>

    <!-- ===== お知らせバナー ===== -->
    <? if (notices.length > 0) { ?>
    <div class="notice-bar">
        <div class="notice-bar-inner">
            <? for (var n = 0; n < notices.length; n++) {
           var notice = notices[n];
           var deadlineStr = '';
           try {
             deadlineStr = Utilities.formatDate(new Date(notice['表示期限']), 'Asia/Tokyo', 'M月d日');
           } catch(e) {}
      ?>
            <div class="notice-item">
                <span class="notice-badge">お知らせ</span>
                <div>
                    <div class="notice-title">
                        <?= notice['タイトル'] ?>
                    </div>
                    <? if (notice['内容']) { ?>
                    <div class="notice-body">
                        <?= notice['内容'] ?>
                    </div>
                    <? } ?>
                </div>
                <? if (deadlineStr) { ?>
                <span class="notice-deadline">
                    <?= deadlineStr ?>まで
                </span>
                <? } ?>
            </div>
            <? } ?>
        </div>
    </div>
    <? } ?>

    <!-- ===== ヘッダー ===== -->
    <header>
        <p class="subtitle">創部100周年記念</p>
        <h1>水球部</h1>
        <div class="wave">
            <svg viewBox="0 0 1440 60" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                <path d="M0,30 C360,60 1080,0 1440,30 L1440,60 L0,60 Z" fill="#f8f5ee" />
            </svg>
        </div>
    </header>

    <!-- ===== ナビ ===== -->
    <nav>
        <a href="#presidents">歴代部長</a>
        <a href="#history">歴史</a>
        <a href="#schedule">今後の予定</a>
    </nav>

    <!-- ===== 歴代部長ギャラリー ===== -->
    <section id="presidents">
        <h2>歴代部長</h2>
        <div class="president-grid">
            <? for (var i = 0; i < presidents.length; i++) {
           var p = presidents[i];
           var thumbUrl = driveThumbUrl(p['DriveID']);
      ?>
            <div class="card">
                <div class="photo-wrap">
                    <? if (thumbUrl) { ?>
                    <img src="<?= thumbUrl ?>" alt="<?= p['氏名'] ?>の写真" loading="lazy">
                    <? } else { ?>
                    <div class="no-photo">🏊</div>
                    <? } ?>
                </div>
                <div class="card-body">
                    <p class="gen">第
                        <?= p['代'] ?>代
                    </p>
                    <p class="name">
                        <?= p['氏名'] ?>
                    </p>
                    <p class="year">
                        <?= p['年度'] ?>
                    </p>
                    <? if (p['コメント']) { ?>
                    <p class="comment">
                        <?= p['コメント'] ?>
                    </p>
                    <? } ?>
                </div>
            </div>
            <? } ?>
        </div>
    </section>

    <!-- ===== 歴史タイムライン ===== -->
    <section id="history" style="max-width:100%; padding:0; background:#fff;">
        <div>
            <h2>部の歴史</h2>
            <div class="timeline">
                <? for (var h = 0; h < history.length; h++) {
             var ev = history[h];
        ?>
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <p class="timeline-year">
                        <?= ev['年度'] ?>年
                    </p>
                    <p class="timeline-title">
                        <?= ev['タイトル'] ?>
                    </p>
                    <? if (ev['内容']) { ?>
                    <p class="timeline-body">
                        <?= ev['内容'] ?>
                    </p>
                    <? } ?>
                </div>
                <? } ?>
            </div>
        </div>
    </section>

    <!-- ===== 今後の予定 ===== -->
    <section id="schedule" style="max-width:100%; padding:0;">
        <div>
            <h2>今後の予定</h2>
            <? if (schedules.length === 0) { ?>
            <p style="color:#6b7f90;">現在登録されている予定はありません。</p>
            <? } else { ?>
            <div class="event-list">
                <? for (var j = 0; j < schedules.length; j++) {
             var s = schedules[j];
             var dateStr = '';
             try {
               dateStr = Utilities.formatDate(new Date(s['日付']), 'Asia/Tokyo', 'M月d日');
             } catch(e) {
               dateStr = s['日付'];
             }
        ?>
                <div class="event">
                    <span class="date">
                        <?= dateStr ?>
                    </span>
                    <div>
                        <div class="event-title">
                            <?= s['タイトル'] ?>
                        </div>
                        <? if (s['詳細']) { ?>
                        <div class="detail">
                            <?= s['詳細'] ?>
                        </div>
                        <? } ?>
                    </div>
                    <span class="place">
                        <?= s['場所'] || '' ?>
                    </span>
                </div>
                <? } ?>
            </div>
            <? } ?>
        </div>
    </section>

    <!-- ===== フッター ===== -->
    <footer>
        <p>&copy; 水球部 創部100周年実行委員会</p>
    </footer>

</body>

</html>
